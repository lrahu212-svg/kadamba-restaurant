<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadamba | Kitchen Command Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=13">
    <style>
        .kitchen-tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }
        .k-tab {
            padding: 12px 24px;
            background: #e8e2d5;
            color: var(--primary);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .k-tab.active {
            background: var(--primary);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }
        .timestamp-badge {
            display: inline-block;
            background: #f0f3f6;
            color: #4b5563;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 6px;
            font-weight: 600;
        }
        .header-logo {
            height: 50px;
            width: auto;
            object-fit: contain;
        }
        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body style="padding-bottom: 40px;">

    <div class="header">
        <div class="header-content">
            <div class="brand-container">
                <img src="{{ url_for('static', filename='logo1.png') }}" alt="Kadamba Logo" class="header-logo">
                <span>KADAMBA PRODUCTION DESK</span>
            </div>
            <span class="header-tagline">Live Order Processing Terminal</span>
        </div>
    </div>

    <div class="main-container" style="margin-top: 25px;">
        
        <div class="kitchen-tab-bar">
            <button id="tabActiveBtn" class="k-tab active" onclick="switchKitchenView('active')">
                🔥 Active Production Queue
            </button>
            <button id="tabHistoryBtn" class="k-tab" onclick="switchKitchenView('history')">
                📦 Completed History Log
            </button>
        </div>
        
        <div id="activeQueueContainer">
            <div id="orders" class="kitchen-grid">
                <p class="empty-state">Waiting for incoming tickets...</p>
            </div>
        </div>

        <div id="historyQueueContainer" style="display: none;">
            <div id="kitchenHistoryGrid" class="kitchen-grid">
                <p class="empty-state">No past orders documented yet.</p>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}?v=13"></script>
</body>
</html>
