<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KITCHEN 2 MONITOR</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { margin: 0; padding: 12px; background: #000; color: #fff; font-family: sans-serif; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .grid-4pieces { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; height: calc(100vh - 90px); }
        .header-bar { background: #111; border: 1px solid #222; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 12px; }
        .station-title { font-size: 24px; font-weight: bold; text-transform: uppercase; color: #3498db; font-family: monospace; }
    </style>
</head>
<body data-kitchen="2">

    <div class="header-bar">
        <span class="station-title">📺 KITCHEN 2 DISPLAY MONITOR</span>
        
        <div id="printerSelectionContainer">
            <span style="color:#555; font-size:13px;">Detecting system configuration printers...</span>
        </div>
    </div>

    <div id="kitchenGrid" class="grid-4pieces"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
